<!DOCTYPE html>
<html>
<head>
<title>Attendance List</title>
</head>

<body>

<h2>Attendance Records</h2>

<table border="1">

<tr>
<th>Name</th>
<th>Status</th>
</tr>

{% for row in data %}
<tr>
<td>{{row[0]}}</td>
<td>{{row[1]}}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
